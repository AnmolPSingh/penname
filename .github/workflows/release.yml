name: Release

# Builds the desktop app for macOS and Windows on every version tag, publishes
# SHA-256 checksums, and attaches SLSA build-provenance attestations. Builds are
# unsigned (zero-budget); the README explains the Gatekeeper/SmartScreen prompts.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write        # create the release and upload assets
  id-token: write        # provenance attestation signing
  attestations: write    # record the provenance

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      # The released binaries use Presidio+spaCy only. Bundling GLiNER pulls in
      # PyTorch, which pushes the macOS app over GitHub's 2 GiB release-asset
      # limit, so GLiNER ships as a source-install extra (uv sync --extra
      # gliner) rather than in the download. The app falls back gracefully.
      - name: Install dependencies
        run: uv sync

      - name: Verify tests pass before building
        run: uv run pytest tests/test_round_trip.py -q

      - name: Build the app (bundles spaCy + models, fully offline)
        run: uv run pyinstaller packaging/penname.spec --noconfirm --distpath dist --workpath build

      - name: Smoke-test the frozen binary (offline detect + round-trip)
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            EXEC="dist/Penname.app/Contents/MacOS/Penname"
          else
            EXEC="dist/Penname/Penname.exe"
          fi
          QT_QPA_PLATFORM=offscreen "$EXEC" --self-test

      # macOS: a drag-to-Applications .dmg plus a .zip fallback. Unsigned.
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          xattr -cr dist/Penname.app
          codesign --force --deep --sign - dist/Penname.app || true
          ( cd dist && zip -qr Penname-macos.zip Penname.app )
          mkdir -p dmg_stage
          cp -R dist/Penname.app dmg_stage/
          ln -s /Applications dmg_stage/Applications
          hdiutil create -volname "Penname" -srcfolder dmg_stage \
            -ov -format UDZO dist/Penname.dmg
          rm -rf dmg_stage

      # Windows: a native Setup.exe (Inno Setup) plus a .zip fallback. Unsigned.
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/Penname -DestinationPath dist/Penname-windows.zip
          choco install innosetup -y --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DAppVersion=${{ github.ref_name }}" packaging\penname.iss

      - name: SHA-256 checksums (all artifacts)
        shell: bash
        run: |
          cd dist
          sha() { command -v shasum >/dev/null && shasum -a 256 "$1" || sha256sum "$1"; }
          for f in Penname-macos.zip Penname.dmg Penname-windows.zip Penname-Setup.exe; do
            [ -f "$f" ] && sha "$f" | tee "$f.sha256"
          done
          true

      - name: Attest build provenance (macOS)
        if: runner.os == 'macOS'
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            dist/Penname-macos.zip
            dist/Penname.dmg

      - name: Attest build provenance (Windows)
        if: runner.os == 'Windows'
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            dist/Penname-windows.zip
            dist/Penname-Setup.exe

      - name: Publish to the release
        uses: softprops/action-gh-release@v3
        with:
          fail_on_unmatched_files: false
          files: |
            dist/Penname-macos.zip
            dist/Penname-macos.zip.sha256
            dist/Penname.dmg
            dist/Penname.dmg.sha256
            dist/Penname-windows.zip
            dist/Penname-windows.zip.sha256
            dist/Penname-Setup.exe
            dist/Penname-Setup.exe.sha256
