name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # let every OS report, don't cancel the matrix on one failure
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      # PySide6 needs Qt's system libraries plus a display to run the GUI tests.
      # The bare Ubuntu runner has neither; macOS/Windows ship them and have a
      # session, so they only need the offscreen platform. On Linux we install
      # the Qt/xcb libs and run the GUI tests under a virtual X server (Xvfb).
      - name: Install Qt system libraries + Xvfb (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 \
            libxcb-cursor0 libxcb-xinerama0 libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 x11-utils xvfb

      - name: Install dependencies
        run: uv sync

      # The integrity gate must not depend on GUI tooling, so pytest-qt is
      # disabled here — a round trip has nothing to do with Qt.
      - name: Round-trip suite (gate)
        run: uv run pytest tests/test_round_trip.py -q -p no:pytestqt
        env:
          QT_QPA_PLATFORM: offscreen

      # Full suite includes the PySide6 GUI tests. On Linux, run under Xvfb so
      # Qt has a real (virtual) display; elsewhere the offscreen platform is fine.
      - name: Full test suite with coverage
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            xvfb-run -a uv run pytest --cov=penname --cov-fail-under=80 -q
          else
            QT_QPA_PLATFORM=offscreen uv run pytest --cov=penname --cov-fail-under=80 -q
          fi
