name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      # PySide6 needs Qt's system shared libraries; the bare Ubuntu runner
      # lacks them (libEGL.so.1 etc.), which otherwise crashes pytest-qt at
      # startup. macOS/Windows ship these inside the PySide6 wheel.
      - name: Install Qt system libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Install dependencies
        run: uv sync

      # The integrity gate must not depend on GUI tooling, so pytest-qt is
      # disabled here — a round trip has nothing to do with Qt.
      - name: Round-trip suite (gate)
        run: uv run pytest tests/test_round_trip.py -q -p no:pytestqt
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Full test suite with coverage
        run: uv run pytest --cov=penname --cov-fail-under=80 -q
        env:
          QT_QPA_PLATFORM: offscreen
